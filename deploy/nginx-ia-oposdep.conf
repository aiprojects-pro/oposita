# =============================================================================
# Proxy inverso HTTPS para el cuestionario IA-OPOSDEP
# Colócalo en /etc/nginx/sites-available/ia-oposdep.conf y enlázalo en
# sites-enabled. Sustituye "cuestionario.tudominio.es" por tu dominio real.
#
# Requisitos previos:
#   - El contenedor escuchando en 127.0.0.1:3000 (docker compose up -d)
#   - Certificado TLS (p. ej. Let's Encrypt / certbot)
# =============================================================================

# --- HTTP: redirige todo a HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name cuestionario.tudominio.es;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name cuestionario.tudominio.es;

    # Certificados TLS (ajusta las rutas a las de tu certbot)
    ssl_certificate     /etc/letsencrypt/live/cuestionario.tudominio.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cuestionario.tudominio.es/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- ANONIMATO (protocolo ético 26/3-44): NO registrar IPs ---
    # Por defecto desactivamos el log de acceso por completo.
    access_log off;
    # Si necesitas logs, usa un formato anonimizado (sin $remote_addr). Define en
    # el bloque http {} de /etc/nginx/nginx.conf:
    #   log_format anonimo '- - [$time_local] "$request" $status $body_bytes_sent';
    # y aquí:
    #   access_log /var/log/nginx/ia-oposdep.access.log anonimo;
    error_log /var/log/nginx/ia-oposdep.error.log warn;

    # --- Cabeceras de seguridad ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # El cuestionario envía JSON pequeño; deja margen sobre el límite de la app (256 KB).
    client_max_body_size 512k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # IMPORTANTE: NO reenviamos la IP del cliente (X-Forwarded-For / X-Real-IP)
        # para preservar el anonimato exigido por el protocolo ético. La aplicación
        # tampoco la utiliza. No añadas estas cabeceras.

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
