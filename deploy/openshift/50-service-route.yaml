apiVersion: v1
kind: Service
metadata:
  name: oposita
  namespace: oposita
  labels:
    app.kubernetes.io/name: oposita
spec:
  selector:
    app.kubernetes.io/name: oposita
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: oposita
  namespace: oposita
  labels:
    app.kubernetes.io/name: oposita
  annotations:
    haproxy.router.openshift.io/balance: source
    haproxy.router.openshift.io/timeout: 60s
spec:
  to:
    kind: Service
    name: oposita
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
