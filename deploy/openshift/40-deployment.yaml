apiVersion: apps/v1
kind: Deployment
metadata:
  name: oposita
  namespace: oposita
  labels:
    app.kubernetes.io/name: oposita
    app.kubernetes.io/component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: oposita
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oposita
        app.kubernetes.io/component: web
      annotations:
        image.openshift.io/triggers: >-
          [{"from":{"kind":"ImageStreamTag","name":"oposita:latest","namespace":"oposita"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image"}]
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/oposita/oposita:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: oposita-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/schema
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/schema
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: oposita-data
