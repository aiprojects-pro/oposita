apiVersion: batch/v1
kind: CronJob
metadata:
  name: oposita-backup
  namespace: oposita
  labels:
    app.kubernetes.io/name: oposita
spec:
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: oposita
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: registry.access.redhat.com/ubi9-minimal:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  mkdir -p /backups
                  tar -czf "/backups/oposita-data-${ts}.tar.gz" -C /data .
                  find /backups -name 'oposita-data-*.tar.gz' -type f -mtime +14 -delete
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backups
                  mountPath: /backups
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: oposita-data
            - name: backups
              persistentVolumeClaim:
                claimName: oposita-backups
